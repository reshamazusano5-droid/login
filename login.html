<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Form</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .login-container{
        width:350px;
        background:#fff;
        padding:30px;
        border-radius:15px;
        box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    .login-container h2{
        text-align:center;
        margin-bottom:20px;
        color:#333;
    }

    .input-group{
        margin-bottom:15px;
    }

    .input-group label{
        display:block;
        margin-bottom:5px;
        color:#555;
    }

    .input-group input{
        width:100%;
        padding:10px;
        border:1px solid #ccc;
        border-radius:8px;
        outline:none;
    }

    .input-group input:focus{
        border-color:#4facfe;
    }

    .btn{
        width:100%;
        padding:10px;
        border:none;
        background:#4facfe;
        color:white;
        font-size:16px;
        border-radius:8px;
        cursor:pointer;
        transition:0.3s;
    }

    .btn:hover{
        background:#2196f3;
    }

    .footer{
        text-align:center;
        margin-top:15px;
        font-size:14px;
    }

    .footer a{
        text-decoration:none;
        color:#4facfe;
    }
</style>
</head>
<body>

<div class="login-container">
    <h2>Login</h2>

    <form>
        <div class="input-group">
            <label>Username</label>
            <input type="text" placeholder="Enter Username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter Password" required>
        </div>

        <button type="submit" class="btn">Login</button>

        <div class="footer">
            Don't have an account? <a href="#">Register</a>
        </div>
    </form>
</div>

</body>
</html>
